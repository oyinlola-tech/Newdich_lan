<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Newdich</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="admin-header">
        <div class="container">
            <h1>Newdich Admin Dashboard</h1>
            <button id="logout-btn" class="btn btn-secondary">Logout</button>
        </div>
    </header>

    <nav class="admin-tabs">
        <div class="container">
            <button class="tab-link active" data-tab="packages">Packages</button>
            <button class="tab-link" data-tab="merchants">Merchants</button>
        </div>
    </nav>

    <main class="admin-main">
        <div class="container">
            <!-- Packages Tab -->
            <div id="packages" class="tab-content active">
                <h2>Manage Service Packages</h2>
                <button id="add-package-btn" class="btn btn-primary">Add New Package</button>
                <div class="package-list" id="package-list">
                    <!-- Packages will be listed here -->
                </div>
                <!-- Package Form (hidden) -->
                <div id="package-form-container" style="display: none;">
                    <h3 id="package-form-title">Add Package</h3>
                    <form id="package-form">
                        <input type="hidden" id="package-id">
                        <div class="form-group">
                            <label for="package-name">Package Name</label>
                            <input type="text" id="package-name" required>
                        </div>
                        <div class="form-group">
                            <label for="package-price">Price ($)</label>
                            <input type="number" step="0.01" id="package-price" required>
                        </div>
                        <div class="form-group">
                            <label for="package-benefits">Benefits (comma separated)</label>
                            <input type="text" id="package-benefits" placeholder="e.g. 24/7 support, No contract">
                        </div>
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" id="cancel-package-btn" class="btn btn-secondary">Cancel</button>
                    </form>
                </div>
            </div>

            <!-- Merchants Tab -->
            <div id="merchants" class="tab-content">
                <h2>Registered Merchants</h2>
                <div class="table-responsive">
                    <table id="merchants-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Business</th>
                                <th>City, State</th>
                                <th>Status</th>
                                <th>Date Created</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Powered by NEWDICH TECHNOLOGY</p>
            <p>&copy; <span id="year"></span> Newdich Technology</p>
        </div>
    </footer>

    <script src="api/index.js"></script>
    <script src="js/admin-dashboard.js"></script>
</body>
</html>
