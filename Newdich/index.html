<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newdich Technology LAN</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23007bff'/%3E%3Ctext x='32' y='42' font-family='Arial, Helvetica, sans-serif' font-size='32' text-anchor='middle' fill='white'%3EN%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">NEWDICH</div>
            <ul class="nav-links">
                <li><a href="#packages">Packages</a></li>
                <li><a href="#signup">Become a Merchant</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <h1>Sell Starlink Internet to Your Community</h1>
                <p>Start your own internet business with our ready‑to‑use platform.</p>
                <a href="#signup" class="btn btn-primary">Get Started</a>
            </div>
        </section>

        <!-- Packages Section -->
        <section id="packages" class="packages">
            <div class="container">
                <h2>Our Service Packages</h2>
                <div class="package-grid" id="package-list">
                    <!-- Packages will be loaded here via JS -->
                </div>
            </div>
        </section>

        <!-- Merchant Signup Form -->
        <section id="signup" class="signup">
            <div class="container">
                <h2>Become a Merchant</h2>
                <form id="merchant-form">
                    <div class="form-group">
                        <label for="fullname">Full Name *</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="business_name">Business Name</label>
                        <input type="text" id="business_name" name="business_name">
                    </div>
                    <div class="form-group">
                        <label for="address">Address *</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label for="state">State *</label>
                            <input type="text" id="state" name="state" required>
                        </div>
                        <div class="form-group">
                            <label for="country">Country *</label>
                            <input type="text" id="country" name="country" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="refer_code">Referral Code (optional)</label>
                        <input type="text" id="refer_code" name="refer_code">
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                    <div id="form-message" class="message"></div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Powered by NEWDICH TECHNOLOGY</p>
            <p>&copy; <span id="year"></span> Newdich Technology. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
