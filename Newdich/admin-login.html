<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Newdich</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23007bff'/%3E%3Ctext x='32' y='42' font-family='Arial, Helvetica, sans-serif' font-size='32' text-anchor='middle' fill='white'%3EN%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="login-page">
        <div class="login-box">
            <h2>Newdich Admin Login</h2>
            <p class="muted">Sign in to manage packages and merchants.</p>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-action">
                        <input type="password" id="password" name="password" required>
                        <button type="button" id="toggle-password" class="link-btn">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <div id="login-message" class="message"></div>
            </form>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>Powered by NEWDICH TECHNOLOGY</p>
            <p>&copy; <span id="year"></span> Newdich Technology</p>
        </div>
    </footer>
    <script type="module" src="js/admin-login.js"></script>
</body>
</html>
